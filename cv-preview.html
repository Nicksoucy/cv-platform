<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prévisualisation du CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/templates.css">
  <script src="js/cv-render.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    .actions {
      max-width: 900px;
      margin: 0 auto 20px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .pdf-hint {
      max-width: 900px;
      margin: 0 auto 20px;
      padding: 12px 16px;
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      color: #1e40af;
      border-radius: 5px;
      font-size: 14px;
      text-align: center;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #6b7280;
      color: white;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    /* Letter size print rules — produces a real, text-based PDF via the browser
       "Save as PDF" dialog. ATS-friendly (selectable, parseable). */
    @page {
      size: letter;
      margin: 0;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .actions,
      .pdf-hint,
      #notification {
        display: none !important;
      }

      .cv-container {
        box-shadow: none !important;
        margin: 0 !important;
      }

      /* Force backgrounds to print on Chrome/Edge/Safari */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }
  </style>
</head>

<body>
  <div class="actions">
    <button class="btn btn-secondary" onclick="goBack()">← Retour</button>
    <button class="btn btn-primary" onclick="downloadPDF()">
      📄 Télécharger en PDF
    </button>
  </div>

  <p class="pdf-hint">
    Choisissez « <strong>Enregistrer au format PDF</strong> » comme destination dans la fenêtre d'impression. Le PDF généré contient du texte sélectionnable, lisible par les systèmes de tri de CV (ATS).
  </p>

  <div id="cv-container" class="cv-container">
    <!-- Le contenu du CV sera injecté ici -->
  </div>
  <script>
    const cvData = JSON.parse(localStorage.getItem("cvData") || "{}");
    const selectedTemplate =
      localStorage.getItem("selectedTemplate") || "moderne";

    if (!cvData.nom) {
      document.getElementById("cv-container").innerHTML = `
        <div style="padding: 40px; text-align: center;">
          <p style="color: #dc2626; font-size: 18px;">Erreur : Aucune donnée trouvée.</p>
          <p style="margin-top: 10px;">Veuillez remplir le formulaire d'abord.</p>
          <button class="btn btn-primary" onclick="goBack()" style="margin-top: 20px;">Retour au formulaire</button>
        </div>
      `;
    } else {
      renderCV("cv-container", cvData, selectedTemplate);
      // Set the suggested filename for the print dialog. Browsers use
      // document.title as the default "Save as PDF" filename.
      const safeName = String(cvData.nom).trim().replace(/\s+/g, "_") || "document";
      document.title = `CV_${safeName}`;
    }

    function goBack() {
      window.location.href = "cv-builder.html";
    }

    function downloadPDF() {
      window.print();
    }
  </script>
</body>

</html>
